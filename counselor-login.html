<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counselor Login | CampusCare</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root{
    --purple-950:#2e1065;
    --purple-800:#4c1d95;
    --purple-700:#5b21b6;
    --purple-600:#6d28d9;
    --purple-500:#7c3aed;
    --purple-400:#8b5cf6;
    --purple-300:#a78bfa;
    --purple-100:#ede9fe;
    --purple-50:#faf5ff;
}

@media (prefers-reduced-motion: reduce){
    .bg-video{ display:none; }
    body{ background:#2e1065; }
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:'Poppins', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#2e1065;
    overflow:hidden;
}

.bg-video{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:0;
    opacity:0.35;
}

.bg-overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg, rgba(46,16,101,0.92) 0%, rgba(109,40,217,0.75) 100%);
    z-index:1;
}

.page{
    position:relative;
    z-index:2;
    display:flex;
    min-height:100vh;
    width:100%;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.brand-mini{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    margin-bottom:22px;
    color:var(--purple-700);
    font-weight:600;
    font-size:15px;
}

.brand-mini i{ color:var(--purple-500); font-size:18px; }

.portal-label{
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--purple-500);
    margin-bottom:4px;
}

.login-card{
    background:white;
    border-radius:24px;
    padding:40px 36px;
    width:100%;
    max-width:420px;
    margin:0 auto;
    box-shadow:0 30px 80px rgba(46,16,101,0.35);
}

.card-header{ text-align:center; margin-bottom:30px; }

.avatar-ring{
    width:64px;
    height:64px;
    border-radius:50%;
    background:var(--purple-100);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 16px;
    font-size:26px;
    color:var(--purple-600);
}

.card-header h2{
    font-family:'Poppins', sans-serif;
    font-size:26px;
    color:var(--purple-950);
}

.form-group{ margin-bottom:18px; }

.form-group label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:#374151;
    margin-bottom:7px;
}

.input-wrap{ position:relative; }

.input-wrap i.prefix{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#9ca3af;
    font-size:14px;
}

.input-wrap input{
    width:100%;
    padding:12px 14px 12px 40px;
    border:1.5px solid #e5e7eb;
    border-radius:11px;
    font-size:14px;
    font-family:'Poppins', sans-serif;
    background:#f9fafb;
    color:#1f2937;
    transition:0.2s;
}

.input-wrap input:focus{
    outline:none;
    border-color:var(--purple-400);
    background:white;
    box-shadow:0 0 0 3px rgba(139,92,246,0.12);
}

.toggle-pw{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:none;
    color:#9ca3af;
    cursor:pointer;
    font-size:14px;
    padding:0;
}

.toggle-pw:hover{ color:#6b7280; }

.error-msg{
    display:none;
    background:#fef2f2;
    border:1px solid #fecaca;
    border-left:3px solid #dc2626;
    color:#b91c1c;
    font-size:13px;
    padding:11px 14px;
    border-radius:9px;
    margin-bottom:16px;
    align-items:center;
    gap:9px;
}

.error-msg.show{ display:flex; }

.login-btn{
    width:100%;
    padding:14px;
    background:var(--purple-600);
    color:white;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    font-family:'Poppins', sans-serif;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    transition:0.2s;
    margin-top:4px;
}

.login-btn:hover{ background:var(--purple-700); }
.login-btn:active{ transform:scale(0.98); }

.login-btn .spinner{
    display:none;
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.35);
    border-top-color:white;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
}

.login-btn.loading .btn-label{ display:none; }
.login-btn.loading .spinner{ display:block; }

@keyframes spin{ to{ transform:rotate(360deg); } }

.back-link{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    margin-top:22px;
    font-size:13px;
    color:#6b7280;
    text-decoration:none;
    transition:0.15s;
}

.back-link:hover{ color:var(--purple-600); }
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/8loet5evlfphyh1nkru55pzh84ek" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<div class="page">

    <div class="login-card">
        <div class="brand-mini">
            <i class="fa-solid fa-heart"></i> CampusCare
        </div>

        <div class="card-header">
            <div class="avatar-ring">
                <i class="fa-solid fa-user-nurse"></i>
            </div>
            <p class="portal-label">Counselor Portal Login</p>
            <h2>Welcome</h2>
        </div>

        <div class="error-msg" id="errorMsg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText">Incorrect username or password.</span>
        </div>

        <div class="form-group">
            <label for="username">Staff / Counselor ID</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user prefix"></i>
                <input type="text" id="username" placeholder="CSL-001" autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock prefix"></i>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <button class="toggle-pw" type="button" onclick="togglePassword()" tabindex="-1">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="loginCounselor()">
            <span class="btn-label"><i class="fa-solid fa-right-to-bracket"></i> &nbsp;Sign In</span>
            <span class="spinner"></span>
        </button>

        <a href="Home.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to CampusCare Home
        </a>
    </div>

</div>

<script>
function loginCounselor() {
    const staffId  = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errBox   = document.getElementById('errorMsg');
    const errText  = document.getElementById('errorText');

    errBox.classList.remove('show');

    if (!staffId || !password) {
        errText.textContent = 'Please enter your Staff ID and password.';
        errBox.classList.add('show');
        return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    const formData = new FormData();
    formData.append('staff_id', staffId);
    formData.append('password', password);

    fetch('counselor-login.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            // Store everything the portal needs in sessionStorage
            sessionStorage.setItem('cLoggedIn', 'true');
            sessionStorage.setItem('cId',       data.staff_id);
            sessionStorage.setItem('cTitle',    data.title);
            sessionStorage.setItem('cName',     data.name);
            sessionStorage.setItem('cEmail',    data.email);
            sessionStorage.setItem('cDept',     data.dept);
            sessionStorage.setItem('cAvatar',   data.avatar || '');
            window.location.href = 'counselor-portal.php';
        } else {
            btn.classList.remove('loading');
            btn.disabled = false;
            errText.textContent = data.message || 'Incorrect Staff ID or password.';
            errBox.classList.add('show');
            shakeCard();
        }
    })
    .catch(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        errText.textContent = 'Cannot connect to server. Please check your connection.';
        errBox.classList.add('show');
    });
}

function shakeCard() {
    const card = document.querySelector('.login-card');
    card.style.transform = 'translateX(-6px)';
    setTimeout(() => card.style.transform = 'translateX(6px)',  80);
    setTimeout(() => card.style.transform = 'translateX(-4px)', 160);
    setTimeout(() => card.style.transform = 'translateX(0)',    240);
}

function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    const visible = input.type === 'text';
    input.type    = visible ? 'password' : 'text';
    icon.className = visible ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginCounselor();
});
</script>

</body>
</html>
